<div class="flex flex-col gap-3 text-left">

    @if (label) {
    <label [for]="id" class="text-sm font-medium text-gray-950">
        {{ label }}
    </label>
    }

    <div class="relative w-full">
        <select [id]="id"
            class="h-9 w-80 px-3 border border-gray-300 rounded-md text-sm text-gray-950 appearance-none focus:outline-none focus:ring-1 focus:border-blue-600 focus:ring-blue-600">

            @for (option of options; track option.value) {
            <option [value]="option.value">
                {{option.label}}
            </option>
            }
        </select>

        <div class="absolute inset-y-0 right-2 flex items-center pointer-events-none text-zinc-400">
            <ng-icon name="heroChevronDownMicro" class="text-base"></ng-icon>
        </div>

    </div>


</div>
