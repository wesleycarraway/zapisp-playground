<div class="flex flex-col gap-3 text-left">

    @if (label) {
    <label [for]="id" class="text-sm font-medium text-gray-950">
        {{ label }}
    </label>
    }

    <input [id]="id" [type]="type" [placeholder]="placeholder" [value]="value"
        class="py-0 leading-9 box-border h-9 w-full px-3 border border-gray-300 rounded-md text-sm text-grey-950
    focus:outline-none placeholder-zinc-400 placeholder:font-normal focus:ring-1 focus:ring-blue-600 focus:border-blue-600" />

</div>
