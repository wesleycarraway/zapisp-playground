<div class="w-fit flex flex-col gap-6 p-6 border bg-slate-50 border-gray-200 rounded-2xl">
    <div class="flex flex-row gap-3 items-center justify-center">
        <div class="grid place-items-center text-(--color-icon-primary) size-9 rounded-md bg-blue-100">
            <ng-icon name="heroFunnel" class="text-2xl"></ng-icon>
        </div>

        <div class="flex flex-col items-start justify-center">
            <h4>Filtros</h4>
            <p class="text-xs font-medium text-zinc-500">Segmente sua pesquisa com filtros personalizados.</p>
        </div>
    </div>

    <p class="text-xs font-medium text-gray-950">Contatos filtrados:</p>

    <div class="relative inline-block">
        <app-button variant="secondary" (click)="toggleFilterModal()">
            <ng-icon name="heroAdjustmentsHorizontalMicro" class="text-base"></ng-icon>

            Filtros

            <span
                class="flex flex-row items-center justify-center text-xs text-(--color-icon-primary) min-w-5 py-0.5 px-1.5 rounded-full bg-zinc-100">
                {{ appliedFiltersCount }}
            </span>
        </app-button>

        @if (isFilterModalOpen) {
        <div class="fixed inset-0 z-40 cursor-default" (click)="isFilterModalOpen = false">
        </div>
        }

        <app-filter [class.hidden]="!isFilterModalOpen" (apply)="onFiltersApplied($event)">
        </app-filter>
    </div>

</div>
